name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Set up Cordova and Build Package
        run: |
          npm install -g cordova
          
          # --- SET YOUR APP NAME HERE ---
          # You can change "Buat Chaca Doang" to whatever name you want!
          cordova create build-dir com.chaca.app "About Him"
          
          # This line automatically handles if your index.html is in the main folder or a www folder
          if [ -d "www" ]; then
            cp -r www/* build-dir/www/
          else
            cp index.html build-dir/www/
          fi
          
          cd build-dir
          cordova platform add android
          
          # --- SET YOUR APP ICON HERE ---
          # If icon.png exists in your main repository, this injects it into the app config
          if [ -f "../icon.png" ]; then
            cp ../icon.png .
            sed -i '/<\/widget>/i \    <icon src="icon.png" \/>' config.xml
          fi
          
          cordova build android --no-telemetry

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: chaca-app-apk
          path: build-dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
