name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Set up Cordova and Build Package
        run: |
          npm install -g cordova
          cordova create build-dir com.chaca.app "Buat Chaca Doang"
          rm -rf build-dir/www/*
          cp -r www/* build-dir/www/
          cd build-dir
          cordova platform add android
          cordova build android --no-telemetry

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: chaca-app-apk
          path: build-dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
