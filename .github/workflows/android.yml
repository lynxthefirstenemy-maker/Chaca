name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Set up Cordova and Build Package
        run: |
          npm install -g cordova
          
          # Create the fresh project folder
          cordova create build-dir com.chaca.app "About Him"
          
          # Move your HTML code into the build directory
          if [ -f "index.html" ]; then
            cp index.html build-dir/www/
          elif [ -f "www/index.html" ]; then
            cp www/index.html build-dir/www/
          fi
          
          cd build-dir
          cordova platform add android
          
          # --- FILE PERMISSIONS FIX INJECTIONS ---
          sed -i '/<\/widget>/i \    <config-file target="AndroidManifest.xml" parent="/*" xmlns:android="http://schemas.android.com/apk/res/android">' config.xml
          sed -i '/<\/widget>/i \        <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />' config.xml
          sed -i '/<\/widget>/i \        <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />' config.xml
          sed -i '/<\/widget>/i \    </config-file>' config.xml
          
          # --- NETWORK BYPASS FOR FORBIDDEN 403 MAVEN ERROR ---
          # Forces Gradle to fall back to Google & MavenLocal repositories first instead of getting stuck on MavenCentral
          if [ -f "platforms/android/build.gradle" ]; then
            sed -i 's/mavenCentral()/google()\n        mavenCentral()/g' platforms/android/build.gradle
          fi
          
          # --- APP ICON CONFIGURATION ---
          if [ -f "../icon.jpeg" ]; then
            cp ../icon.jpeg .
            
            sed -i '/<\/widget>/i \    <icon src="icon.jpeg" \/>' config.xml
            sed -i '/<\/widget>/i \    <splash src="icon.jpeg" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="SplashScreenBackgroundColor" value="#bae6fd" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="SplashMaintainAspectRatio" value="true" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="AutoHideSplashScreen" value="true" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="SplashScreenDelay" value="3000" \/>' config.xml
          fi
          
          cordova build android --no-telemetry

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: chaca-app-apk
          path: build-dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
