name: Build Android APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK Components
        uses: android-actions/setup-android@v3

      - name: Set up Cordova and Build Package
        run: |
          npm install -g cordova
          
          # --- UPDATED APP NAME ---
          cordova create build-dir com.chaca.app "About Him"
          
          if [ -f "index.html" ]; then
            cp index.html build-dir/www/
          elif [ -f "www/index.html" ]; then
            cp www/index.html build-dir/www/
          fi
          
          cd build-dir
          cordova platform add android
          
          # --- UPDATED FOR ICON.JPEG ---
          if [ -f "../icon.jpeg" ]; then
            cp ../icon.jpeg .
            
            # Injects the app icon configuration pointing to icon.jpeg
            sed -i '/<\/widget>/i \    <icon src="icon.jpeg" \/>' config.xml
            
            # Tells the app to use icon.jpeg as the splash screen image
            sed -i '/<\/widget>/i \    <splash src="icon.jpeg" \/>' config.xml
            
            # Colors the background of the splash screen to match your light-blue theme layout beautifully!
            sed -i '/<\/widget>/i \    <preference name="SplashScreenBackgroundColor" value="#bae6fd" \/>' config.xml
            
            # Centers the icon nicely on the screen and stops it from stretching weirdly
            sed -i '/<\/widget>/i \    <preference name="SplashMaintainAspectRatio" value="true" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="AutoHideSplashScreen" value="true" \/>' config.xml
            sed -i '/<\/widget>/i \    <preference name="SplashScreenDelay" value="3000" \/>' config.xml
          fi
          
          cordova build android --no-telemetry

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: chaca-app-apk
          path: build-dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk
